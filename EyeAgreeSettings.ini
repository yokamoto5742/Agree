; 眼科同意書アプリケーション専用設定ファイル
[UI_SETTINGS]
; 1 = 設定ボタンを表示する, 0 = 非表示にする
SHOW_SETTING_BUTTON=0

[BARCODE_SETTINGS]
; バーコード画像の解像度。1モジュール=BARCODE_LINE_WIDTH px
BARCODE_LINE_WIDTH=3
; バーコード画像の高さ(px)
BARCODE_HEIGHT=80
; バーコード両側のクワイエットゾーン(モジュール数)
BARCODE_QUIET_MODULES=10
; バーコードに埋め込む文書コード
DOCUMENT_CODE=39911

[WINDOW_SETTINGS]
; ウィンドウの初期位置（画面左上からのピクセル数）
WINDOW_X=100
WINDOW_Y=100
